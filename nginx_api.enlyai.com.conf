upstream new_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.enlyai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.enlyai.com;

    ssl_certificate /etc/letsencrypt/live/api.enlyai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.enlyai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Sub-filter: minimal HTML replacements only
    sub_filter_once off;
    proxy_set_header Accept-Encoding "";

    # Replace title and meta tags
    sub_filter '<title>New API</title>' '<title>EnlyAI</title>';
    sub_filter 'content="new-api"' 'content="enlyai"';

    # Inject branding script before </head> (only for DOM text replacement)
    sub_filter '</head>' '<script>function _r(n){if(n.nodeType===3){var t=n.textContent,s=t.replace(/New API/g,"EnlyAI").replace(/NewAPI/g,"EnlyAI").replace(/new-api/g,"enlyai");if(t!==s)n.textContent=s}else if(n.nodeType===1&&n.tagName!=="SCRIPT"&&n.tagName!=="STYLE"){for(var i=0;i<n.childNodes.length;i++)_r(n.childNodes[i])}}function _d(){_r(document.body);document.title=document.title.replace(/New API/g,"EnlyAI")}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",_d);else _d();var _o=new MutationObserver(function(m){m.forEach(function(e){for(var i=0;i<e.addedNodes.length;i++)_r(e.addedNodes[i])})});_o.observe(document.documentElement,{childList:true,subtree:true});</script></head>';

    location / {
        proxy_pass http://new_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 100m;
    }

    location ~ ^/v1/(chat|completions|audio|images|files) {
        proxy_pass http://new_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
