
# Mirror upstream for chat request logging
# Detect search engine crawlers
map $http_user_agent $is_crawler {
    default 0;
    ~*Googlebot 1;
    ~*Baiduspider 1;
    ~*bingbot 1;
    ~*Slurp 1;
    ~*DuckDuckBot 1;
    ~*Sogou 1;
    ~*360Spider 1;
    ~*YisouSpider 1;
}

upstream chat_logger {
    server 127.0.0.1:8901;
}

server {
    listen 80;
    listen [::]:80;
    server_name enlyai.com www.enlyai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }


    # EnlyAI Logo 静态资源拦截
    location = /logo.png {
        alias /var/www/enlyai-assets/logo.png;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.ico {
        alias /var/www/enlyai-assets/favicon.ico;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location = /lang.js {
        alias /var/www/enlyai-assets/lang.js;
        default_type application/javascript;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }


    location = /waffo-logo-dark.svg {
        alias /var/www/enlyai-assets/waffo-logo-dark.svg;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /waffo-logo-light.svg {
        alias /var/www/enlyai-assets/waffo-logo-light.svg;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

        location = /team.jpg {
        alias /var/www/enlyai-assets/team.jpg;
        expires 1h;
        add_header Cache-Control "public, must-revalidate, max-age=3600";
        etag on;
        access_log off;
    }


    # Blog static pages
    location /blog/ {
        alias /var/www/enlyai.com/blog/;
        index index.html;
        try_files $uri $uri/ /blog/index.html;
        
        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        
        # Cache static HTML for 1 hour
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        return 301 https://enlyai.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name enlyai.com;

